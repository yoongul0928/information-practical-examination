<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정보처리기사 실기 기출문제</title>
    <link rel="stylesheet" href="styles.css?v=20260417b">
    <script defer src="script.js?v=20260417b"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>정보처리기사 실기</h1>
            <p>기출문제 모음집</p>
        </div>

        <div class="controls">
            <div class="control-group">
                <label for="yearSelect">년도:</label>
                <select id="yearSelect">
                    <option value="">선택하세요</option>
                </select>
            </div>

            <div class="control-group">
                <label for="roundSelect">회차:</label>
                <select id="roundSelect" disabled>
                    <option value="">먼저 년도를 선택하세요</option>
                </select>
            </div>

            <div class="button-group">
                <button id="toggleAnswersBtn" disabled onclick="toggleAllAnswers()">정답 보기</button>
                <button id="printBtn" disabled onclick="window.print()">🖨️ PDF로 저장</button>
            </div>
        </div>

        <div class="content" id="content">
            <div class="empty-state">
                <h2>문제를 선택해주세요</h2>
                <p>위에서 년도와 회차를 선택하면 기출문제를 볼 수 있습니다.</p>
            </div>
        </div>
    </div>


</body>
</html>
